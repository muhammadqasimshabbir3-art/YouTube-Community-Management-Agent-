# Fly.io configuration for LangGraph API backend.
# First deploy: fly launch (use existing fly.toml) then fly secrets set ...
app = "youtube-community-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  BROWSER_HEADLESS = "true"
  # Comma-separated origins — override in fly secrets for production URL
  # CORS_ALLOW_ORIGINS = "http://localhost:5173,https://your-app.vercel.app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
